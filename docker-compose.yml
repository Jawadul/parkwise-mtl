services:
  postgis:
    image: postgis/postgis:16-3.4
    container_name: parkwise-db
    environment:
      POSTGRES_DB: parkwise
      POSTGRES_USER: parkwise
      POSTGRES_PASSWORD: parkwise
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U parkwise"]
      interval: 5s
      timeout: 3s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: parkwise-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@parkwise.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgis:
        condition: service_healthy

volumes:
  pgdata:
